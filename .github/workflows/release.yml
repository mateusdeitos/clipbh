name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClipDB-*.dmg
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClipDB-*.AppImage
            dist/ClipDB-*.deb
          generate_release_notes: false
